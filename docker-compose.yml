services:
  auth-db:
    image: postgres:17-alpine
    container_name: auth-db
    environment:
      POSTGRES_DB: auth_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  product-db:
    image: postgres:17-alpine
    container_name: product-db
    environment:
      POSTGRES_DB: product_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - product-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d product_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./apps/auth-service
    container_name: auth-service
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: auth_service
      JWT_SECRET: ClaveSecretaMuySeguraCambiarEnProduccion
      JWT_EXPIRATION: 10m
      REFRESH_EXPIRATION: 7d
      ALLOWED_ORIGINS: http://localhost,http://127.0.0.1
    depends_on:
      auth-db:
        condition: service_healthy
    restart: always

  product-service:
    build: ./apps/products
    container_name: product-service
    ports:
      - "3001:3000"
    environment:
      PORT: 3000
      DB_HOST: product-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: product_service
      JWT_SECRET: ClaveSecretaMuySeguraCambiarEnProduccion
      ALLOWED_ORIGINS: http://localhost,http://127.0.0.1
    depends_on:
      product-db:
        condition: service_healthy
    restart: always

  frontend:
    build: ./apps/frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - product-service

  sonarqube:
    profiles:
      - sonarqube
    image: sonarqube:9.9-community
    container_name: taller-sast-sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
      - SONARQUBE_WEB_JVM_OPTS=-Xmx512m -Xms128m
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions

volumes:
  auth-db-data:
  product-db-data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions: