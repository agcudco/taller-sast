version: '3.8'

networks:
  app-network:
    driver: bridge

services:
  auth-db:
    image: postgres:17-alpine
    container_name: auth-db
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  product-db:
    image: postgres:17-alpine
    container_name: product-db
    env_file: .env
    ports:
      - "5433:5432"
    volumes:
      - product-db-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d product_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./apps/auth-service
    container_name: auth-service
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - app-network
    restart: always

  product-service:
    build: ./apps/products
    container_name: product-service
    env_file: .env
    ports:
      - "3001:3000"
    depends_on:
      product-db:
        condition: service_healthy
    networks:
      - app-network
    restart: always

  frontend:
    build: ./apps/frontend
    container_name: frontend
    ports:
      - "80:80"
    environment:
      - VITE_AUTH_API_URL=http://localhost:3000
      - VITE_PRODUCT_API_URL=http://localhost:3001
    networks:
      - app-network
    depends_on:
      - auth-service
      - product-service

volumes:
  auth-db-data:
  product-db-data: