services:
  auth-db:
    image: postgres:17-alpine
    container_name: auth-db
    environment:
      POSTGRES_DB: auth_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres   
    ports:
      - "5432:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_service"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  product-db:
    image: postgres:17-alpine
    container_name: product-db
    environment:
      POSTGRES_DB: product_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres   # ← contraseña definida
    ports:
      - "5433:5432"
    volumes:
      - product-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d product_service"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  auth-service:
    build: ./apps/auth-service
    container_name: auth-service
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: auth_service
      ALLOWED_ORIGINS: http://localhost:80,http://localhost:3000,http://localhost:3001
      JWT_SECRET: ClaveSecretaMuySeguraCambiarEnProduccion
      JWT_EXPIRATION: 10m
      REFRESH_EXPIRATION: 7d
    depends_on:
      auth-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/', (res) => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  product-service:
    build: ./apps/products
    container_name: product-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: product-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: product_service
      ALLOWED_ORIGINS: http://localhost:80,http://localhost:3000,http://localhost:3001
      JWT_SECRET: ClaveSecretaMuySeguraCambiarEnProduccion
    depends_on:
      product-db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3001/', (res) => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build: ./apps/frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      auth-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
    restart: unless-stopped

volumes:
  auth-db-data:
  product-db-data:
