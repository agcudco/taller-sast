sonar.projectKey=taller-sast
sonar.projectName=Taller SAST
sonar.projectVersion=1.0

# Monorepo: analizar el codigo fuente de todas las apps
sonar.sources=apps

# Excluir dependencias, builds, tests y artefactos generados
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.spec.ts,**/*.test.ts,**/test/**,**/package-lock.json,**/Dockerfile,**/.scannerwork/**

# Cobertura (opcional: generar con yarn sonar:coverage)
sonar.javascript.lcov.reportPaths=apps/auth-service/coverage/lcov.info,apps/products/coverage/lcov.info

sonar.host.url=http://localhost:9000
