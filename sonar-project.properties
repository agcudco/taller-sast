# ============================================
# CONFIGURACIÓN PRINCIPAL
# ============================================
sonar.projectKey=taller-sast
sonar.projectName=Taller SAST - Análisis de Seguridad
sonar.projectVersion=1.0.0

# ============================================
# MÓDULOS DEL MONOREPO
# ============================================
sonar.modules=auth-service,frontend,products,analisis-vulnerabilidades

# ============================================
# MÓDULO: AUTH-SERVICE (NestJS)
# ============================================
auth-service.sonar.projectName=Auth Service
auth-service.sonar.moduleBaseDir=apps/auth-service
auth-service.sonar.sources=src
auth-service.sonar.tests=src
auth-service.sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.e2e-spec.ts
auth-service.sonar.exclusions=**/node_modules/**,**/*.module.ts,**/main.ts,**/*.dto.ts,**/*.entity.ts
auth-service.sonar.typescript.lcov.reportPaths=../../coverage/auth-service/lcov.info
auth-service.sonar.javascript.lcov.reportPaths=../../coverage/auth-service/lcov.info
auth-service.sonar.typescript.tsconfigPath=tsconfig.json
auth-service.sonar.language=ts

# ============================================
# MÓDULO: FRONTEND (React)
# ============================================
frontend.sonar.projectName=Frontend
frontend.sonar.moduleBaseDir=apps/frontend
frontend.sonar.sources=src
frontend.sonar.tests=src
frontend.sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.spec.tsx,**/*.test.tsx
frontend.sonar.exclusions=**/node_modules/**,**/*.stories.tsx,**/*.d.ts,**/index.tsx,**/assets/**,**/*.css
frontend.sonar.typescript.lcov.reportPaths=../../coverage/frontend/lcov.info
frontend.sonar.javascript.lcov.reportPaths=../../coverage/frontend/lcov.info
frontend.sonar.typescript.tsconfigPath=tsconfig.json
frontend.sonar.language=ts

# ============================================
# MÓDULO: PRODUCTS (NestJS)
# ============================================
products.sonar.projectName=Products Service
products.sonar.moduleBaseDir=apps/products
products.sonar.sources=src
products.sonar.tests=src
products.sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.e2e-spec.ts
products.sonar.exclusions=**/node_modules/**,**/*.module.ts,**/main.ts,**/*.dto.ts,**/*.entity.ts
products.sonar.typescript.lcov.reportPaths=../../coverage/products/lcov.info
products.sonar.javascript.lcov.reportPaths=../../coverage/products/lcov.info
products.sonar.typescript.tsconfigPath=tsconfig.json
products.sonar.language=ts

# ============================================
# MÓDULO: ANÁLISIS VULNERABILIDADES
# ============================================
analisis-vulnerabilidades.sonar.projectName=Análisis Vulnerabilidades
analisis-vulnerabilidades.sonar.moduleBaseDir=apps/analisis-vulnerabilidades
analisis-vulnerabilidades.sonar.sources=src
analisis-vulnerabilidades.sonar.tests=src
analisis-vulnerabilidades.sonar.test.inclusions=**/*.spec.ts,**/*.test.ts
analisis-vulnerabilidades.sonar.exclusions=**/node_modules/**,**/index.ts
analisis-vulnerabilidades.sonar.typescript.lcov.reportPaths=../../coverage/analisis-vulnerabilidades/lcov.info
analisis-vulnerabilidades.sonar.javascript.lcov.reportPaths=../../coverage/analisis-vulnerabilidades/lcov.info
analisis-vulnerabilidades.sonar.typescript.tsconfigPath=tsconfig.json
analisis-vulnerabilidades.sonar.language=ts

# ============================================
# CONFIGURACIÓN GLOBAL
# ============================================
sonar.sourceEncoding=UTF-8
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.next/**,**/coverage/**
sonar.typescript.node=false