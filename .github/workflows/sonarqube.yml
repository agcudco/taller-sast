name: SonarQube SAST Analysis

on:
  push:
    branches: [ main, test, dev ]
  pull_request:
    branches: [ main, test, dev ]
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  sonarqube:
    name: 🔍 Análisis SAST
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    services:
      sonarqube:
        image: sonarqube:10-community
        ports:
          - 9000:9000
        env:
          SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
          SONAR_SEARCH_JAVAADDITIONALOPTS: "-Xms512m -Xmx512m"
        options: >-
          --health-cmd "curl -sf http://localhost:9000/api/system/status || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 20

    steps:
      # ==========================================
      # 1. CHECKOUT
      # ==========================================
      - name: 📥 Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ==========================================
      # 2. CONFIGURAR NODE.JS
      # ==========================================
      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # ==========================================
      # 3. INSTALAR DEPENDENCIAS
      # ==========================================
      - name: 📦 Instalar dependencias
        run: |
          echo "📦 Instalando dependencias del monorepo..."
          npm ci --ignore-scripts || npm install --ignore-scripts
          echo "✅ Dependencias instaladas"

      # ==========================================
      # 4. ESPERAR SONARQUBE
      # ==========================================
      - name: ⏳ Esperar SonarQube
        run: |
          echo "⏳ Esperando SonarQube..."
          for i in {1..60}; do
            STATUS=$(curl -sf http://localhost:9000/api/system/status 2>/dev/null | jq -r '.status' 2>/dev/null || echo "waiting")
            if [ "$STATUS" = "UP" ]; then
              echo "✅ SonarQube listo"
              break
            fi
            echo "  Esperando... ($i/60)"
            sleep 5
          done
          
          if ! curl -sf http://localhost:9000/api/system/status | grep -q "UP"; then
            echo "❌ SonarQube no inició"
            exit 1
          fi

      # ==========================================
      # 5. CONFIGURAR SONARQUBE (Token + QG)
      # ==========================================
      - name: 🔧 Configurar SonarQube
        run: |
          # Cambiar contraseña
          curl -sf -X POST "http://localhost:9000/api/users/change_password" \
            -u "admin:admin" \
            -d "login=admin&previousPassword=admin&password=SastPass123!" || true
          
          sleep 2
          
          # Generar token
          TOKEN=$(curl -sf -X POST "http://localhost:9000/api/user_tokens/generate" \
            -u "admin:SastPass123!" \
            -d "name=ci-$(date +%s)&type=GLOBAL_ANALYSIS_TOKEN" | jq -r '.token')
          
          echo "SONAR_TOKEN=$TOKEN" >> $GITHUB_ENV
          
          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "❌ Error generando token"
            exit 1
          fi
          echo "✅ Token generado"
          
          # ==========================================
          # CREAR QUALITY GATE PARA SAST
          # ==========================================
          echo "🚧 Creando Quality Gate SAST..."
          
          QG_ID=$(curl -sf -X POST "http://localhost:9000/api/qualitygates/create" \
            -u "admin:SastPass123!" \
            -d "name=SAST Security Standard" | jq -r '.id')
          
          # Sin bugs nuevos (CRÍTICO)
          curl -sf -X POST "http://localhost:9000/api/qualitygates/create_condition" \
            -u "admin:SastPass123!" \
            -d "gateId=$QG_ID&metric=new_bugs&op=LT&error=1"
          
          # Sin vulnerabilidades nuevas (CRÍTICO)
          curl -sf -X POST "http://localhost:9000/api/qualitygates/create_condition" \
            -u "admin:SastPass123!" \
            -d "gateId=$QG_ID&metric=new_vulnerabilities&op=LT&error=1"
          
          # Security hotspots revisados
          curl -sf -X POST "http://localhost:9000/api/qualitygates/create_condition" \
            -u "admin:SastPass123!" \
            -d "gateId=$QG_ID&metric=new_security_hotspots_reviewed&op=LT&error=1"
          
          # Code smells limitados
          curl -sf -X POST "http://localhost:9000/api/qualitygates/create_condition" \
            -u "admin:SastPass123!" \
            -d "gateId=$QG_ID&metric=new_code_smells&op=LT&warning=10&error=20"
          
          # Duplicación controlada
          curl -sf -X POST "http://localhost:9000/api/qualitygates/create_condition" \
            -u "admin:SastPass123!" \
            -d "gateId=$QG_ID&metric=duplicated_lines_density&op=GT&warning=5&error=10"
          
          # Ratings A en todo
          curl -sf -X POST "http://localhost:9000/api/qualitygates/create_condition" \
            -u "admin:SastPass123!" \
            -d "gateId=$QG_ID&metric=sqale_rating&op=LT&error=2"
          
          curl -sf -X POST "http://localhost:9000/api/qualitygates/create_condition" \
            -u "admin:SastPass123!" \
            -d "gateId=$QG_ID&metric=reliability_rating&op=LT&error=2"
          
          curl -sf -X POST "http://localhost:9000/api/qualitygates/create_condition" \
            -u "admin:SastPass123!" \
            -d "gateId=$QG_ID&metric=security_rating&op=LT&error=2"
          
          # Establecer como defecto
          curl -sf -X POST "http://localhost:9000/api/qualitygates/set_as_default" \
            -u "admin:SastPass123!" \
            -d "id=$QG_ID"
          
          echo "✅ Quality Gate 'SAST Security Standard' configurado"

      # ==========================================
      # 6. TESTS Y COVERAGE POR MÓDULO
      # ==========================================
      - name: 🧪 Tests - Auth Service
        working-directory: apps/auth-service
        run: |
          echo "🧪 Ejecutando tests Auth Service..."
          mkdir -p ../../coverage/auth-service
          
          if [ -f "jest.config.js" ] || [ -f "jest.config.ts" ]; then
            npx jest --coverage --coverageDirectory=../../coverage/auth-service \
              --coverageReporters=lcov --ci --forceExit 2>/dev/null || true
          else
            echo "⚠️ No se encontró configuración Jest"
            echo "" > ../../coverage/auth-service/lcov.info
          fi
          
          [ ! -f "../../coverage/auth-service/lcov.info" ] && echo "" > ../../coverage/auth-service/lcov.info
          echo "✅ Auth Service completado"

      - name: 🧪 Tests - Frontend
        working-directory: apps/frontend
        run: |
          echo "🧪 Ejecutando tests Frontend..."
          mkdir -p ../../coverage/frontend
          
          if [ -f "jest.config.js" ] || [ -f "jest.config.ts" ]; then
            npx jest --coverage --coverageDirectory=../../coverage/frontend \
              --coverageReporters=lcov --ci --forceExit 2>/dev/null || true
          elif grep -q "\"test\"" package.json 2>/dev/null; then
            npm test -- --coverage --coverageDirectory=../../coverage/frontend \
              --coverageReporters=lcov --ci --forceExit 2>/dev/null || true
          else
            echo "⚠️ No se encontró configuración de tests"
            echo "" > ../../coverage/frontend/lcov.info
          fi
          
          [ ! -f "../../coverage/frontend/lcov.info" ] && echo "" > ../../coverage/frontend/lcov.info
          echo "✅ Frontend completado"

      - name: 🧪 Tests - Products
        working-directory: apps/products
        run: |
          echo "🧪 Ejecutando tests Products..."
          mkdir -p ../../coverage/products
          
          if [ -f "jest.config.js" ] || [ -f "jest.config.ts" ]; then
            npx jest --coverage --coverageDirectory=../../coverage/products \
              --coverageReporters=lcov --ci --forceExit 2>/dev/null || true
          else
            echo "⚠️ No se encontró configuración Jest"
            echo "" > ../../coverage/products/lcov.info
          fi
          
          [ ! -f "../../coverage/products/lcov.info" ] && echo "" > ../../coverage/products/lcov.info
          echo "✅ Products completado"

      - name: 🧪 Tests - Análisis Vulnerabilidades
        working-directory: apps/analisis-vulnerabilidades
        run: |
          echo "🧪 Ejecutando tests Análisis Vulnerabilidades..."
          mkdir -p ../../coverage/analisis-vulnerabilidades
          
          if [ -f "jest.config.js" ] || [ -f "jest.config.ts" ]; then
            npx jest --coverage --coverageDirectory=../../coverage/analisis-vulnerabilidades \
              --coverageReporters=lcov --ci --forceExit 2>/dev/null || true
          else
            echo "⚠️ No se encontró configuración Jest"
            echo "" > ../../coverage/analisis-vulnerabilidades/lcov.info
          fi
          
          [ ! -f "../../coverage/analisis-vulnerabilidades/lcov.info" ] && echo "" > ../../coverage/analisis-vulnerabilidades/lcov.info
          echo "✅ Análisis Vulnerabilidades completado"

      # ==========================================
      # 7. ANÁLISIS SONARQUBE
      # ==========================================
      - name: 🔍 Ejecutar SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: http://localhost:9000
          SONAR_SCANNER_OPTS: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300

      # ==========================================
      # 8. VERIFICAR QUALITY GATE
      # ==========================================
      - name: ✅ Verificar Quality Gate
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║          RESULTADO QUALITY GATE - SAST                  ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          
          QG=$(curl -sf "http://localhost:9000/api/qualitygates/project_status?projectKey=taller-sast" \
            -u "admin:SastPass123!")
          
          STATUS=$(echo "$QG" | jq -r '.projectStatus.status')
          
          echo "║  Rama: ${{ github.ref_name }}"
          echo "║  Commit: ${GITHUB_SHA:0:7}"
          echo "║  Estado: $STATUS"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  CONDICIONES:"
          
          echo "$QG" | jq -r '.projectStatus.conditions[] | "║    • \(.metric): \(.status) [\(.actualValue)]"'
          
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  MÉTRICAS POR MÓDULO:"
          
          for MOD in "auth-service" "frontend" "products" "analisis-vulnerabilidades"; do
            KEY="taller-sast:$MOD"
            METRICS=$(curl -sf "http://localhost:9000/api/measures/component?component=$KEY&metricKeys=ncloc,bugs,vulnerabilities,code_smells" \
              -u "admin:SastPass123!" 2>/dev/null)
            
            echo "║"
            echo "║  📦 $MOD"
            echo "$METRICS" | jq -r '.measures[]? | "║      - \(.metric): \(.value)"' 2>/dev/null
          done
          
          echo "╚══════════════════════════════════════════════════════════╝"
          echo ""
          
          if [ "$STATUS" != "OK" ]; then
            echo "❌ QUALITY GATE FALLADO"
            echo "   Revisa los problemas antes de hacer merge"
            exit 1
          fi
          
          echo "✅ QUALITY GATE APROBADO"

      # ==========================================
      # 9. RESUMEN GITHUB
      # ==========================================
      - name: 📊 Resumen en GitHub
        if: always()
        run: |
          QG=$(curl -sf "http://localhost:9000/api/qualitygates/project_status?projectKey=taller-sast" \
            -u "admin:SastPass123!" 2>/dev/null || echo '{}')
          
          STATUS=$(echo "$QG" | jq -r '.projectStatus.status // "UNKNOWN"')
          
          [ "$STATUS" = "OK" ] && EMOJI="✅" || EMOJI="❌"
          
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          # $EMOJI Análisis SAST - Taller SAST
          
          ## Módulos Analizados
          
          | Módulo | Tipo | Estado |
          |--------|------|--------|
          | 📁 auth-service | NestJS | ✅ Analizado |
          | 📁 frontend | React | ✅ Analizado |
          | 📁 products | NestJS | ✅ Analizado |
          | 📁 analisis-vulnerabilidades | Utils | ✅ Analizado |
          
          ## Quality Gate: **$STATUS**
          
          <details>
          <summary>📋 Ver condiciones evaluadas</summary>
          
          EOF
          
          echo "$QG" | jq -r '.projectStatus.conditions[] | "- **\(.metric)**: `\(.status)` (valor: `\(.actualValue)`)"' >> $GITHUB_STEP_SUMMARY
          
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          
          </details>
          
          ---
          *Rama: `BRANCH` | Commit: `COMMIT`*
          EOF
          
          sed -i "s/BRANCH/${{ github.ref_name }}/g" $GITHUB_STEP_SUMMARY
          sed -i "s/COMMIT/${GITHUB_SHA:0:7}/g" $GITHUB_STEP_SUMMARY