name: SonarQube SAST Analysis

on:
  push:
    branches: [ main, test, dev ]
  pull_request:
    branches: [ main, test, dev ]
  workflow_dispatch:

jobs:
  sonarqube:
    name: 🔍 Análisis SAST
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    services:
      sonarqube:
        image: sonarqube:10-community
        ports:
          - 9000:9000
        env:
          SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
          SONAR_SEARCH_JAVAADDITIONALOPTS: "-Xms512m -Xmx512m"
        options: >-
          --health-cmd "curl -sf http://localhost:9000/api/system/status || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 20

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Instalar dependencias
        run: npm install --ignore-scripts

      - name: ⏳ Esperar SonarQube
        run: |
          echo "⏳ Esperando SonarQube..."
          for i in {1..60}; do
            STATUS=$(curl -sf http://localhost:9000/api/system/status 2>/dev/null | jq -r '.status' 2>/dev/null || echo "waiting")
            if [ "$STATUS" = "UP" ]; then
              echo "✅ SonarQube listo"
              break
            fi
            sleep 5
          done
          
          if ! curl -sf http://localhost:9000/api/system/status | grep -q "UP"; then
            echo "❌ SonarQube no inició"
            exit 1
          fi

      # ========== PASO CORREGIDO ==========
      - name: 🔧 Configurar SonarQube y Quality Gate
        run: |
          # Generar token (con reintento)
          TOKEN_RESPONSE=$(curl -s -X POST "http://localhost:9000/api/user_tokens/generate" \
            -u "admin:admin" \
            -d "name=ci-token&type=GLOBAL_ANALYSIS_TOKEN")
          TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.token')
          
          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "Reintentando generación de token en 10s..."
            sleep 10
            TOKEN_RESPONSE=$(curl -s -X POST "http://localhost:9000/api/user_tokens/generate" \
              -u "admin:admin" \
              -d "name=ci-token&type=GLOBAL_ANALYSIS_TOKEN")
            TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.token')
          fi
          
          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "❌ Error: $TOKEN_RESPONSE"
            exit 1
          fi
          
          echo "SONAR_TOKEN=$TOKEN" >> $GITHUB_ENV
          echo "✅ Token generado"

          # Crear o recuperar Quality Gate por nombre
          QG_NAME="SAST Standard"
          EXISTING=$(curl -s "http://localhost:9000/api/qualitygates/list" -u "admin:admin" | jq -r --arg name "$QG_NAME" '.qualitygates[] | select(.name==$name) | .id')
          
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            QG_ID=$EXISTING
            echo "ℹ️ Quality Gate '$QG_NAME' ya existe con ID $QG_ID"
          else
            QG_ID=$(curl -s -X POST "http://localhost:9000/api/qualitygates/create" \
              -u "admin:admin" \
              -d "name=$QG_NAME" | jq -r '.id')
            if [ "$QG_ID" = "null" ] || [ -z "$QG_ID" ]; then
              echo "❌ Falló la creación del Quality Gate"
              exit 1
            fi
            echo "✅ Quality Gate '$QG_NAME' creado con ID $QG_ID"
          fi

          # Establecer como predeterminado (opcional)
          curl -s -X POST "http://localhost:9000/api/qualitygates/set_as_default" -u "admin:admin" -d "id=$QG_ID" || true

          # Crear condiciones (usando el ID)
          curl -s -X POST "http://localhost:9000/api/qualitygates/create_condition" -u "admin:admin" -d "gateId=$QG_ID&metric=new_bugs&op=LT&error=1" || true
          curl -s -X POST "http://localhost:9000/api/qualitygates/create_condition" -u "admin:admin" -d "gateId=$QG_ID&metric=new_vulnerabilities&op=LT&error=1" || true
          curl -s -X POST "http://localhost:9000/api/qualitygates/create_condition" -u "admin:admin" -d "gateId=$QG_ID&metric=new_security_hotspots_reviewed&op=LT&error=1" || true
          curl -s -X POST "http://localhost:9000/api/qualitygates/create_condition" -u "admin:admin" -d "gateId=$QG_ID&metric=new_code_smells&op=LT&warning=10&error=20" || true
          curl -s -X POST "http://localhost:9000/api/qualitygates/create_condition" -u "admin:admin" -d "gateId=$QG_ID&metric=duplicated_lines_density&op=GT&warning=5&error=10" || true
          curl -s -X POST "http://localhost:9000/api/qualitygates/create_condition" -u "admin:admin" -d "gateId=$QG_ID&metric=sqale_rating&op=LT&error=2" || true
          curl -s -X POST "http://localhost:9000/api/qualitygates/create_condition" -u "admin:admin" -d "gateId=$QG_ID&metric=reliability_rating&op=LT&error=2" || true
          curl -s -X POST "http://localhost:9000/api/qualitygates/create_condition" -u "admin:admin" -d "gateId=$QG_ID&metric=security_rating&op=LT&error=2" || true

          echo "✅ Quality Gate configurado"

      - name: 🧪 Tests - Auth Service
        working-directory: apps/auth-service
        run: |
          mkdir -p ../../coverage/auth-service
          if [ -f "jest.config.js" ] || [ -f "jest.config.ts" ]; then
            npx jest --coverage --coverageDirectory=../../coverage/auth-service --coverageReporters=lcov --ci --forceExit 2>/dev/null || true
          fi
          [ ! -f "../../coverage/auth-service/lcov.info" ] && echo "" > ../../coverage/auth-service/lcov.info

      - name: 🧪 Tests - Frontend
        working-directory: apps/frontend
        run: |
          mkdir -p ../../coverage/frontend
          if [ -f "jest.config.js" ] || [ -f "jest.config.ts" ]; then
            npx jest --coverage --coverageDirectory=../../coverage/frontend --coverageReporters=lcov --ci --forceExit 2>/dev/null || true
          fi
          [ ! -f "../../coverage/frontend/lcov.info" ] && echo "" > ../../coverage/frontend/lcov.info

      - name: 🧪 Tests - Products
        working-directory: apps/products
        run: |
          mkdir -p ../../coverage/products
          if [ -f "jest.config.js" ] || [ -f "jest.config.ts" ]; then
            npx jest --coverage --coverageDirectory=../../coverage/products --coverageReporters=lcov --ci --forceExit 2>/dev/null || true
          fi
          [ ! -f "../../coverage/products/lcov.info" ] && echo "" > ../../coverage/products/lcov.info

      - name: 🧪 Tests - Análisis Vulnerabilidades
        working-directory: apps/analisis-vulnerabilidades
        run: |
          mkdir -p ../../coverage/analisis-vulnerabilidades
          if [ -f "jest.config.js" ] || [ -f "jest.config.ts" ]; then
            npx jest --coverage --coverageDirectory=../../coverage/analisis-vulnerabilidades --coverageReporters=lcov --ci --forceExit 2>/dev/null || true
          fi
          [ ! -f "../../coverage/analisis-vulnerabilidades/lcov.info" ] && echo "" > ../../coverage/analisis-vulnerabilidades/lcov.info

      - name: 🔍 Ejecutar SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: http://sonarqube:9000
          SONAR_SCANNER_OPTS: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300

      # ========== PASO CORREGIDO ==========
      - name: ✅ Verificar Quality Gate y Obtener Métricas
        if: always()
        run: |
          if ! curl -sf http://localhost:9000/api/system/status > /dev/null 2>&1; then
            echo "# ⚠️ Análisis Incompleto" >> $GITHUB_STEP_SUMMARY
            echo "El contenedor de SonarQube no está disponible." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Pausa de seguridad para que la BD guarde las métricas
          echo "Esperando a que las métricas estén disponibles..."
          sleep 5

          # Obtener métricas y estado del Quality Gate
          METRICS_RAW=$(curl -s "http://localhost:9000/api/measures/component?component=taller-sast&metricKeys=bugs,vulnerabilities,code_smells,duplicated_lines_density,ncloc,security_rating,reliability_rating,sqale_rating" -u "admin:admin")
          QG_RAW=$(curl -s "http://localhost:9000/api/qualitygates/project_status?projectKey=taller-sast" -u "admin:admin")

          # Extraer valores con jq (usando // para valores por defecto)
          BUGS=$(echo "$METRICS_RAW" | jq -r '.component.measures[] | select(.metric=="bugs") | .value // 0')
          VULNS=$(echo "$METRICS_RAW" | jq -r '.component.measures[] | select(.metric=="vulnerabilities") | .value // 0')
          SMELLS=$(echo "$METRICS_RAW" | jq -r '.component.measures[] | select(.metric=="code_smells") | .value // 0')
          DUPL=$(echo "$METRICS_RAW" | jq -r '.component.measures[] | select(.metric=="duplicated_lines_density") | .value // 0.0')
          LINES=$(echo "$METRICS_RAW" | jq -r '.component.measures[] | select(.metric=="ncloc") | .value // 0')
          SEC_R=$(echo "$METRICS_RAW" | jq -r '.component.measures[] | select(.metric=="security_rating") | .value // 1')
          REL_R=$(echo "$METRICS_RAW" | jq -r '.component.measures[] | select(.metric=="reliability_rating") | .value // 1')
          MAIN_R=$(echo "$METRICS_RAW" | jq -r '.component.measures[] | select(.metric=="sqale_rating") | .value // 1')
          QG_STATUS=$(echo "$QG_RAW" | jq -r '.projectStatus.status // "UNKNOWN"')

          # Convertir ratings numéricos a letras
          rating_to_letter() { case $1 in 1) echo "A";; 2) echo "B";; 3) echo "C";; 4) echo "D";; 5) echo "E";; *) echo "?";; esac }
          SEC_LETTER=$(rating_to_letter $SEC_R)
          REL_LETTER=$(rating_to_letter $REL_R)
          MAIN_LETTER=$(rating_to_letter $MAIN_R)

          # Guardar en variables de entorno para el siguiente paso
          echo "METRICS_BUGS=$BUGS" >> $GITHUB_ENV
          echo "METRICS_VULNS=$VULNS" >> $GITHUB_ENV
          echo "METRICS_SMELLS=$SMELLS" >> $GITHUB_ENV
          echo "METRICS_DUPL=$DUPL" >> $GITHUB_ENV
          echo "METRICS_LINES=$LINES" >> $GITHUB_ENV
          echo "METRICS_SEC=$SEC_LETTER" >> $GITHUB_ENV
          echo "METRICS_REL=$REL_LETTER" >> $GITHUB_ENV
          echo "METRICS_MAIN=$MAIN_LETTER" >> $GITHUB_ENV
          echo "QG_STATUS=$QG_STATUS" >> $GITHUB_ENV

      - name: 📊 Reporte en GitHub
        if: always()
        run: |
          if [ "$QG_STATUS" = "OK" ]; then
            EMOJI="✅"
            STATUS_TXT="APROBADO"
          else
            EMOJI="❌"
            STATUS_TXT="FALLADO"
          fi
          
          # Emojis para ratings
          rating_emoji() { case $1 in A) echo "🟢";; B) echo "🟡";; *) echo "🔴";; esac }
          
          cat >> $GITHUB_STEP_SUMMARY << EOF
          # ${EMOJI} Reporte SAST - Taller SAST
          
          ## Estado del Quality Gate: **${STATUS_TXT}**
          
          ### Métricas Generales
          
          | Métrica | Valor |
          |---|---|
          | 🐛 Bugs | **${METRICS_BUGS}** |
          | 🔓 Vulnerabilidades | **${METRICS_VULNS}** |
          | 👃 Code Smells | **${METRICS_SMELLS}** |
          | 📋 Líneas de código | **${METRICS_LINES}** |
          | 🔄 Duplicación | **${METRICS_DUPL}%** |
          
          ### Ratings de Calidad
          
          | Categoría | Rating |
          |---|---|
          | 🔒 Seguridad | $(rating_emoji $METRICS_SEC) **${METRICS_SEC}** |
          | 🛡️ Fiabilidad | $(rating_emoji $METRICS_REL) **${METRICS_REL}** |
          | 🏗️ Mantenibilidad | $(rating_emoji $METRICS_MAIN) **${METRICS_MAIN}** |
          
          ---
          *Análisis ejecutado en rama \`${{ github.ref_name }}\`*
          EOF