name: SonarQube SAST Analysis

on:
  push:
    branches: [ main, test, dev ]
  pull_request:
    branches: [ main, test, dev ]
  workflow_dispatch:

jobs:
  sonarqube:
    name: рџ”Ќ AnГЎlisis SAST
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      sonarqube:
        image: sonarqube:10-community
        ports:
          - 9000:9000
        env:
          SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
          SONAR_SEARCH_JAVAADDITIONALOPTS: "-Xms512m -Xmx512m"
        options: >-
          --health-cmd "curl -sf http://localhost:9000/api/system/status || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 20

    steps:
      # ---------- 1. PreparaciГіn del entorno ----------
      - name: рџ“Ґ Checkout cГіdigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: рџџў Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: рџ“¦ Instalar dependencias
        run: npm install --ignore-scripts

      # ---------- 2. Esperar a que SonarQube estГ© listo ----------
      - name: вЏі Esperar SonarQube
        run: |
          echo "вЏі Esperando SonarQube..."
          for i in {1..60}; do
            STATUS=$(curl -sf http://localhost:9000/api/system/status 2>/dev/null | jq -r '.status' 2>/dev/null || echo "waiting")
            if [ "$STATUS" = "UP" ]; then
              echo "вњ… SonarQube listo"
              break
            fi
            sleep 5
          done
          if ! curl -sf http://localhost:9000/api/system/status | grep -q "UP"; then
            echo "вќЊ SonarQube no iniciГі"
            exit 1
          fi

      # ---------- 3. Configurar Quality Gate restrictivo ----------
      - name: рџ”§ Configurar Quality Gate restrictivo
        run: |
          # 3.1 Generar token de anГЎlisis (con reintento)
          TOKEN_RESPONSE=$(curl -s -X POST "http://localhost:9000/api/user_tokens/generate" \
            -u "admin:admin" \
            -d "name=ci-token&type=GLOBAL_ANALYSIS_TOKEN")
          TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.token')
          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "Reintentando generaciГіn de token en 10s..."
            sleep 10
            TOKEN_RESPONSE=$(curl -s -X POST "http://localhost:9000/api/user_tokens/generate" \
              -u "admin:admin" \
              -d "name=ci-token&type=GLOBAL_ANALYSIS_TOKEN")
            TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.token')
          fi
          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "вќЊ Error generando token: $TOKEN_RESPONSE"
            exit 1
          fi
          echo "SONAR_TOKEN=$TOKEN" >> $GITHUB_ENV
          echo "вњ… Token generado"

          # 3.2 Crear Quality Gate con nombre Гєnico (para evitar conflictos)
          QG_NAME="SAST-Standard-$(date +%s)"
          echo "рџ“Њ Creando Quality Gate: $QG_NAME"
          QG_ID=$(curl -s -X POST "http://localhost:9000/api/qualitygates/create" \
            -u "admin:admin" \
            -d "name=$QG_NAME" | jq -r '.id')

          if [ "$QG_ID" = "null" ] || [ -z "$QG_ID" ]; then
            echo "вљ пёЏ No se pudo crear '$QG_NAME'. Usando el Quality Gate por defecto 'Sonar way'."
            QG_ID=$(curl -s "http://localhost:9000/api/qualitygates/list" -u "admin:admin" | jq -r '.qualitygates[] | select(.name=="Sonar way") | .id')
            if [ -z "$QG_ID" ] || [ "$QG_ID" = "null" ]; then
              echo "вќЊ No se encontrГі el Quality Gate por defecto. Se usarГЎ el que tenga el proyecto."
              QG_ID=""
            else
              echo "вњ… Usando Quality Gate 'Sonar way' con ID $QG_ID"
            fi
          else
            echo "вњ… Quality Gate '$QG_NAME' creado con ID $QG_ID"
          fi

          # 3.3 Si tenemos ID, configurar condiciones RESTRICTIVAS PARA NUEVO CГ“DIGO
          if [ -n "$QG_ID" ] && [ "$QG_ID" != "null" ]; then
            # Eliminar condiciones existentes (para evitar duplicados)
            CONDITIONS=$(curl -s "http://localhost:9000/api/qualitygates/show?id=$QG_ID" -u "admin:admin" | jq -r '.conditions[]?.id')
            for cond in $CONDITIONS; do
              curl -s -X POST "http://localhost:9000/api/qualitygates/delete_condition" -u "admin:admin" -d "id=$cond" > /dev/null
            done

            # Condiciones sobre cГіdigo NUEVO (mГ©tricas new_*)
            curl -s -X POST "http://localhost:9000/api/qualitygates/create_condition" -u "admin:admin" -d "gateId=$QG_ID&metric=new_bugs&op=LT&error=1" || true
            curl -s -X POST "http://localhost:9000/api/qualitygates/create_condition" -u "admin:admin" -d "gateId=$QG_ID&metric=new_vulnerabilities&op=LT&error=1" || true
            curl -s -X POST "http://localhost:9000/api/qualitygates/create_condition" -u "admin:admin" -d "gateId=$QG_ID&metric=new_security_hotspots_reviewed&op=LT&error=100" || true
            curl -s -X POST "http://localhost:9000/api/qualitygates/create_condition" -u "admin:admin" -d "gateId=$QG_ID&metric=new_code_smells&op=LT&warning=5&error=10" || true
            curl -s -X POST "http://localhost:9000/api/qualitygates/create_condition" -u "admin:admin" -d "gateId=$QG_ID&metric=new_duplicated_lines_density&op=GT&warning=5&error=10" || true
            curl -s -X POST "http://localhost:9000/api/qualitygates/create_condition" -u "admin:admin" -d "gateId=$QG_ID&metric=new_maintainability_rating&op=GT&error=2" || true
            curl -s -X POST "http://localhost:9000/api/qualitygates/create_condition" -u "admin:admin" -d "gateId=$QG_ID&metric=new_reliability_rating&op=GT&error=2" || true
            curl -s -X POST "http://localhost:9000/api/qualitygates/create_condition" -u "admin:admin" -d "gateId=$QG_ID&metric=new_security_rating&op=GT&error=2" || true

            # Establecer este Quality Gate como predeterminado
            curl -s -X POST "http://localhost:9000/api/qualitygates/set_as_default" -u "admin:admin" -d "id=$QG_ID" || true

            echo "вњ… Quality Gate restrictivo configurado (ID $QG_ID)"
          else
            echo "вљ пёЏ No se pudo configurar un Quality Gate personalizado. Se usarГЎ el predeterminado."
          fi

      # ---------- 4. Ejecutar tests y generar cobertura ----------
      - name: рџ§Є Tests - Auth Service
        working-directory: apps/auth-service
        run: |
          mkdir -p ../../coverage/auth-service
          if [ -f "jest.config.js" ] || [ -f "jest.config.ts" ]; then
            npx jest --coverage --coverageDirectory=../../coverage/auth-service --coverageReporters=lcov --ci --forceExit 2>/dev/null || true
          fi
          [ ! -f "../../coverage/auth-service/lcov.info" ] && echo "" > ../../coverage/auth-service/lcov.info

      - name: рџ§Є Tests - Frontend
        working-directory: apps/frontend
        run: |
          mkdir -p ../../coverage/frontend
          if [ -f "jest.config.js" ] || [ -f "jest.config.ts" ]; then
            npx jest --coverage --coverageDirectory=../../coverage/frontend --coverageReporters=lcov --ci --forceExit 2>/dev/null || true
          fi
          [ ! -f "../../coverage/frontend/lcov.info" ] && echo "" > ../../coverage/frontend/lcov.info

      - name: рџ§Є Tests - Products
        working-directory: apps/products
        run: |
          mkdir -p ../../coverage/products
          if [ -f "jest.config.js" ] || [ -f "jest.config.ts" ]; then
            npx jest --coverage --coverageDirectory=../../coverage/products --coverageReporters=lcov --ci --forceExit 2>/dev/null || true
          fi
          [ ! -f "../../coverage/products/lcov.info" ] && echo "" > ../../coverage/products/lcov.info

      - name: рџ§Є Tests - AnГЎlisis Vulnerabilidades
        working-directory: apps/analisis-vulnerabilidades
        run: |
          mkdir -p ../../coverage/analisis-vulnerabilidades
          if [ -f "jest.config.js" ] || [ -f "jest.config.ts" ]; then
            npx jest --coverage --coverageDirectory=../../coverage/analisis-vulnerabilidades --coverageReporters=lcov --ci --forceExit 2>/dev/null || true
          fi
          [ ! -f "../../coverage/analisis-vulnerabilidades/lcov.info" ] && echo "" > ../../coverage/analisis-vulnerabilidades/lcov.info

      # ---------- 5. Ejecutar escaneo de SonarQube ----------
      - name: рџ”Ќ Ejecutar SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: http://sonarqube:9000
          SONAR_SCANNER_OPTS: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300

      # ---------- 6. Verificar Quality Gate y obtener mГ©tricas ----------
      - name: вњ… Verificar Quality Gate y Obtener MГ©tricas
        if: always()
        run: |
          # FunciГіn para esperar hasta que las mГ©tricas estГ©n disponibles
          wait_for_metrics() {
            local max_attempts=30
            local attempt=1
            while [ $attempt -le $max_attempts ]; do
              METRICS_RAW=$(curl -s "http://localhost:9000/api/measures/component?component=taller-sast&metricKeys=bugs,vulnerabilities,code_smells,duplicated_lines_density,ncloc,security_rating,reliability_rating,sqale_rating" -u "admin:admin")
              COMPONENT=$(echo "$METRICS_RAW" | jq -r '.component // null')
              if [ "$COMPONENT" != "null" ] && [ -n "$COMPONENT" ]; then
                echo "вњ… MГ©tricas disponibles"
                echo "$METRICS_RAW"
                return 0
              fi
              echo "вЏі Esperando mГ©tricas (intento $attempt/$max_attempts)..."
              sleep 5
              attempt=$((attempt+1))
            done
            echo "вљ пёЏ No se obtuvieron mГ©tricas despuГ©s de $max_attempts intentos"
            return 1
          }

          # Esperar y capturar las mГ©tricas
          if wait_for_metrics; then
            METRICS_RAW=$(curl -s "http://localhost:9000/api/measures/component?component=taller-sast&metricKeys=bugs,vulnerabilities,code_smells,duplicated_lines_density,ncloc,security_rating,reliability_rating,sqale_rating" -u "admin:admin")
            QG_RAW=$(curl -s "http://localhost:9000/api/qualitygates/project_status?projectKey=taller-sast" -u "admin:admin")

            # Extraer valores con valores por defecto
            BUGS=$(echo "$METRICS_RAW" | jq -r '.component.measures[]? | select(.metric=="bugs") | .value // 0')
            VULNS=$(echo "$METRICS_RAW" | jq -r '.component.measures[]? | select(.metric=="vulnerabilities") | .value // 0')
            SMELLS=$(echo "$METRICS_RAW" | jq -r '.component.measures[]? | select(.metric=="code_smells") | .value // 0')
            DUPL=$(echo "$METRICS_RAW" | jq -r '.component.measures[]? | select(.metric=="duplicated_lines_density") | .value // 0.0')
            LINES=$(echo "$METRICS_RAW" | jq -r '.component.measures[]? | select(.metric=="ncloc") | .value // 0')
            SEC_R=$(echo "$METRICS_RAW" | jq -r '.component.measures[]? | select(.metric=="security_rating") | .value // 1')
            REL_R=$(echo "$METRICS_RAW" | jq -r '.component.measures[]? | select(.metric=="reliability_rating") | .value // 1')
            MAIN_R=$(echo "$METRICS_RAW" | jq -r '.component.measures[]? | select(.metric=="sqale_rating") | .value // 1')
            QG_STATUS=$(echo "$QG_RAW" | jq -r '.projectStatus.status // "UNKNOWN"')
          else
            # Valores por defecto si no hay mГ©tricas
            BUGS=0
            VULNS=0
            SMELLS=0
            DUPL=0.0
            LINES=0
            SEC_R=1
            REL_R=1
            MAIN_R=1
            QG_STATUS="UNKNOWN"
          fi

          # Convertir ratings numГ©ricos a letras
          rating_to_letter() { case $1 in 1) echo "A";; 2) echo "B";; 3) echo "C";; 4) echo "D";; 5) echo "E";; *) echo "?";; esac }
          SEC_LETTER=$(rating_to_letter $SEC_R)
          REL_LETTER=$(rating_to_letter $REL_R)
          MAIN_LETTER=$(rating_to_letter $MAIN_R)

          # Determinar estado del Quality Gate y emojis
          if [ "$QG_STATUS" = "OK" ]; then
            EMOJI="вњ…"
            STATUS_TXT="APROBADO"
          else
            EMOJI="вќЊ"
            STATUS_TXT="FALLADO"
          fi

          # Guardar en variables de entorno para los pasos posteriores
          echo "METRICS_BUGS=$BUGS" >> $GITHUB_ENV
          echo "METRICS_VULNS=$VULNS" >> $GITHUB_ENV
          echo "METRICS_SMELLS=$SMELLS" >> $GITHUB_ENV
          echo "METRICS_DUPL=$DUPL" >> $GITHUB_ENV
          echo "METRICS_LINES=$LINES" >> $GITHUB_ENV
          echo "METRICS_SEC=$SEC_LETTER" >> $GITHUB_ENV
          echo "METRICS_REL=$REL_LETTER" >> $GITHUB_ENV
          echo "METRICS_MAIN=$MAIN_LETTER" >> $GITHUB_ENV
          echo "QG_STATUS=$QG_STATUS" >> $GITHUB_ENV
          echo "EMOJI=$EMOJI" >> $GITHUB_ENV
          echo "STATUS_TXT=$STATUS_TXT" >> $GITHUB_ENV

      # ---------- 7. Generar reporte en GitHub ----------
      - name: рџ“Љ Reporte en GitHub
        if: always()
        run: |
          rating_emoji() { case $1 in A) echo "рџџў";; B) echo "рџџЎ";; *) echo "рџ”ґ";; esac }

          cat >> $GITHUB_STEP_SUMMARY << EOF
          # ${EMOJI} Reporte SAST - Taller SAST

          ## Estado del Quality Gate: **${STATUS_TXT}**

          ### MГ©tricas Generales

          | MГ©trica | Valor |
          |---|---|
          | рџђ› Bugs | **${METRICS_BUGS}** |
          | рџ”“ Vulnerabilidades | **${METRICS_VULNS}** |
          | рџ‘ѓ Code Smells | **${METRICS_SMELLS}** |
          | рџ“‹ LГ­neas de cГіdigo | **${METRICS_LINES}** |
          | рџ”„ DuplicaciГіn | **${METRICS_DUPL}%** |

          ### Ratings de Calidad

          | CategorГ­a | Rating |
          |---|---|
          | рџ”’ Seguridad | $(rating_emoji $METRICS_SEC) **${METRICS_SEC}** |
          | рџ›ЎпёЏ Fiabilidad | $(rating_emoji $METRICS_REL) **${METRICS_REL}** |
          | рџЏ—пёЏ Mantenibilidad | $(rating_emoji $METRICS_MAIN) **${METRICS_MAIN}** |

          ---
          *AnГЎlisis ejecutado en rama \`${{ github.ref_name }}\`*
          EOF

      # ---------- 8. Enviar notificaciГіn a Telegram ----------
      - name: рџ“Ё Enviar notificaciГіn a Telegram
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            *${EMOJI} AnГЎlisis SAST - Taller SAST*
            
            *Estado del Quality Gate:* ${STATUS_TXT}
            *Rama:* `${{ github.ref_name }}`
            *Autor:* ${{ github.actor }}
            *Commit:* ${{ github.event.head_commit.message }}
            
            *MГ©tricas Generales:*
            рџђ› Bugs: ${METRICS_BUGS}
            рџ”“ Vulnerabilidades: ${METRICS_VULNS}
            рџ‘ѓ Code Smells: ${METRICS_SMELLS}
            рџ“‹ LГ­neas de cГіdigo: ${METRICS_LINES}
            рџ”„ DuplicaciГіn: ${METRICS_DUPL}%
            
            *Ratings de Calidad:*
            рџ”’ Seguridad: ${METRICS_SEC}
            рџ›ЎпёЏ Fiabilidad: ${METRICS_REL}
            рџЏ—пёЏ Mantenibilidad: ${METRICS_MAIN}
            
            [Ver detalles en SonarQube](http://sonarqube:9000/dashboard?id=taller-sast)