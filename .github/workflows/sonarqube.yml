name: SonarQube Analysis

on:
  push:
    branches:
      - main
      - 'taller_sast/**'
      - 'taller-sast/**'
  pull_request:

jobs:
  sonarqube:
    name: SonarQube Community
    runs-on: ubuntu-latest

    services:
      sonarqube:
        image: sonarqube:9.9-community
        env:
          SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: true
          SONARQUBE_WEB_JVM_OPTS: -Xmx512m -Xms128m
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -f http://localhost:9000/api/system/status || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install SonarScanner
        run: |
          SCANNER_VERSION=5.0.1.3006
          wget -q "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-${SCANNER_VERSION}-linux.zip"
          unzip -q "sonar-scanner-cli-${SCANNER_VERSION}-linux.zip"
          echo "$PWD/sonar-scanner-${SCANNER_VERSION}-linux/bin" >> "$GITHUB_PATH"

      - name: Bootstrap SonarQube and generate token
        run: |
          echo "Esperando SonarQube..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:9000/api/system/status | grep -q UP; then
              echo "SonarQube operativo"
              break
            fi
            sleep 10
          done

          curl -sf -u admin:admin -X POST \
            "http://localhost:9000/api/users/change_password" \
            -d "login=admin&previousPassword=admin&password=Admin12345!" || true

          AUTH="admin:Admin12345!"
          curl -sf -u "$AUTH" -X POST \
            "http://localhost:9000/api/projects/create?project=taller-sast&name=Taller%20SAST" || true

          TOKEN=$(curl -sf -u "$AUTH" -X POST \
            "http://localhost:9000/api/user_tokens/generate?name=github-actions-$(date +%s)" \
            | jq -r .token)

          echo "SONAR_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "SONAR_HOST_URL=http://localhost:9000" >> "$GITHUB_ENV"

      - name: Run SonarScanner
        run: sonar-scanner -Dsonar.host.url="$SONAR_HOST_URL" -Dsonar.token="$SONAR_TOKEN"

      - name: Analysis summary
        run: echo "Dashboard -> $SONAR_HOST_URL/dashboard?id=taller-sast"
